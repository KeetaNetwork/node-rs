# Rustfmt Configuration
#
# This configuration file controls the formatting of Rust code in this project.
# It enforces a consistent style with a focus on readability.

# Ignore generated files
ignore = ["keetanetwork-asn1/src/generated.rs"]

# Indentation settings
# --------------------
# Use tabs instead of spaces for indentation
hard_tabs = true
# Set tab width to 4 spaces (for display purposes)
tab_spaces = 4

# Line width settings
# ------------------
# Hard limit: Maximum width of 120 characters (absolute maximum line length)
max_width = 120

# Soft limit: Encourage keeping lines under 80 characters when possible
use_small_heuristics = "Max"

# Method chain formatting
# ----------------------
# Setting to 1 forces method chains to be multi-line for readability
chain_width = 60

# Control structures formatting
# -----------------------------
# Always use block form for if-else chains
single_line_if_else_max_width = 0
# Control when to use single line for let-else
single_line_let_else_max_width = 0
