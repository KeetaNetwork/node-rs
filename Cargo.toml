[workspace]
resolver = "2"
members = ["accounts", "keetanet-error", "crypto", "x509", "asn1"]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Tanveer Wahid <twahid@keeta.com>"]

[workspace.dependencies]
# Common dependencies that can be shared across workspace members

[workspace.dependencies.chrono]
version = "0.4.41"
features = ["serde", "now"]

[workspace.dependencies.base32]
version = "0.5.1"

[workspace.dependencies.base64]
version = "0.22.1"

[workspace.dependencies.bip39-dict]
version = "0.1.3"

[workspace.dependencies.hex]
version = "0.4.3"

[workspace.dependencies.hex-literal]
version = "1.0.0"

[workspace.dependencies.der]
version = "0.7.10"
features = ["std", "pem", "zeroize", "bytes", "oid", "derive"]

[workspace.dependencies.serde]
version = "1.0.219"
features = ["derive"]

[workspace.dependencies.serde_json]
version = "1.0.143"

[workspace.dependencies.secrecy]
version = "0.10.3"
features = ["serde"]

[workspace.dependencies.snafu]
version = "0.8.7"
features = ["std"]

[workspace.dependencies.strum]
version = "0.27.2"

[workspace.dependencies.strum_macros]
version = "0.27.2"

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
debug = false
lto = true
codegen-units = 1
panic = "abort"

[profile.test]
opt-level = 1
debug = true
