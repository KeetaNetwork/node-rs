# SonarCloud configuration for node-rs
sonar.projectKey=KeetaPay_node_rs
sonar.organization=keetapay

# Project information
# sonar.projectName=node-rs
# sonar.projectVersion=1.0

# Source code settings
# sonar.sources=.
sonar.sources=.
sonar.exclusions=target/**,**/*.md,**/*.toml,**/*.yml,**/*.yaml,**/*.json

# Rust specific settings
sonar.rust.lcov.reportPaths=coverage.lcov

# Test settings
sonar.tests=.
sonar.test.inclusions=**/*test*.rs,**/tests/**

# Coverage settings
sonar.coverage.exclusions=**/*test*.rs,**/tests/**,**/examples/**,**/benches/**
