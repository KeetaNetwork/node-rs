# SonarCloud configuration for node-rs
sonar.projectKey=KeetaNetwork_node-rs
sonar.organization=keetapay

# Project information
# sonar.projectName=node-rs
# sonar.projectVersion=1.0

# Source code settings
# sonar.sources=.
sonar.sources=.
sonar.exclusions=target/**,**/*.md,**/*.toml,**/*.yml,**/*.yaml,**/*.json,**/*.java

# Rust specific settings
sonar.rust.lcov.reportPaths=coverage.lcov

# Test settings
sonar.tests=.
sonar.test.inclusions=**/*test*.rs,**/tests/**

# Coverage settings
sonar.coverage.exclusions=**/*test*.rs,**/tests/**,**/examples/**,**/benches/**,**/build.rs,**/error.rs,**/node-harness/**,**/*.ts,**/*.js

# The wasm binding facades are intentionally parallel
sonar.cpd.exclusions=keetanetwork-client-wasm/src/client.rs,keetanetwork-client-wasm/src/user.rs
