# getrandom 0.3's browser backend is selected by this cfg in addition to the
# `wasm_js` feature (enabled for the wasm target in keetanetwork-client). It is
# scoped to wasm32-unknown-unknown so native builds are unaffected.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
